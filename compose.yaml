services:
  backend:
    build:
      context: backend
      target: development
    command: npm run start-watch
    environment:
      - DATABASE_DB=${DATABASE_DB:-example}
      - DATABASE_USER=${DATABASE_USER:-root}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-changeme}
      - DATABASE_HOST=db
      - DATABASE_PORT=${DATABASE_PORT:-3306}
      - NODE_ENV=development
    ports:
      - "80:80"
      - "9229:9229"
      - "9230:9230"
    volumes:
      - ./backend/src:/code/src:ro
      - ./backend/package.json:/code/package.json
      - ./backend/package-lock.json:/code/package-lock.json
      - back-notused:/code/node_modules
    networks:
      - public
      - private
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.6.4-focal
    command: "--default-authentication-plugin=mysql_native_password"
    restart: always
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - private
    environment:
      - MYSQL_DATABASE=${DATABASE_DB:-example}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: frontend
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/code/src
      - /code/node_modules
    networks:
      - public
    depends_on:
      - backend

networks:
  public:
  private:

volumes:
  back-notused:
  db-data:
